name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  build-and-release:
    name: Build MSI e pubblica release
    runs-on: windows-latest

    permissions:
      contents: write  # necessario per creare release e caricare asset

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Estrai versione dal tag
        id: version
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Versione: $VERSION"

      - name: Build MSI
        shell: bash
        run: |
          ./gradlew :composeApp:packageMsi \
            -Papp.version=${{ steps.version.outputs.version }} \
            --no-daemon
        env:
          JAVA_TOOL_OPTIONS: "-Dfile.encoding=UTF-8"

      - name: Trova file MSI
        id: msi
        shell: bash
        run: |
          MSI_PATH=$(find composeApp/build/compose/binaries/main/msi -name "*.msi" | head -1)
          echo "path=$MSI_PATH" >> $GITHUB_OUTPUT
          echo "File MSI: $MSI_PATH"

      - name: Pubblica GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Scuola di Ministero ${{ steps.version.outputs.tag }}
          draft: false
          prerelease: false
          files: ${{ steps.msi.outputs.path }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
